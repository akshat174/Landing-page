<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: #0f172a;
      color: #fff;
    }

    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px;
      text-align: center;
    }

    .whatsapp-float {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .wa-label {
      background: #ffffff;
      color: #111827;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      animation: floatInOut 1.8s ease-in-out infinite;
      white-space: nowrap;
    }

    .wa-button-wrap {
      position: relative;
      width: 64px;
      height: 64px;
    }

    .wa-ripple,
    .wa-ripple::before,
    .wa-ripple::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(37, 211, 102, 0.28);
      animation: ripple 2s infinite;
    }

    .wa-ripple::before {
      animation-delay: 0.4s;
    }

    .wa-ripple::after {
      animation-delay: 0.8s;
    }

    .wa-button {
      position: relative;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #25d366;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(37, 211, 102, 0.45);
      animation: bounceSoft 1.6s infinite;
      transition: transform 0.2s ease;
    }

    .wa-button:hover {
      transform: scale(1.08);
    }

    .wa-button svg {
      width: 30px;
      height: 30px;
      fill: white;
    }

    @keyframes ripple {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }
      70% {
        transform: scale(1.8);
        opacity: 0;
      }
      100% {
        transform: scale(1.8);
        opacity: 0;
      }
    }

    @keyframes bounceSoft {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes floatInOut {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    @media (max-width: 600px) {
      .wa-label {
        display: none;
      }
      .wa-button-wrap {
        width: 58px;
        height: 58px;
      }
      .wa-button {
        width: 58px;
        height: 58px;
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Your Landing Page</h1>
    <p>Yahan apna business content daalo.</p>
  </div>

  <a
